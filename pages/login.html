<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — RoadWatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-light">

  <div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0 w-100" style="max-width:420px">
      <div class="card-body p-4">

        <!-- Logo -->
        <div class="text-center mb-4">
          <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:60px;height:60px">
            <i class="ti ti-road text-white" style="font-size:1.75rem"></i>
          </div>
          <h4 class="fw-bold mb-0">Masuk ke RoadWatch</h4>
          <p class="text-muted small">Laporkan kerusakan jalan di sekitar kamu</p>
        </div>

        <!-- Info akun demo -->
        <div class="alert alert-info small mb-3 p-2">
          <strong>Demo:</strong> Warga: <code>warga@roadwatch.id</code> / <code>warga123</code><br>
          Petugas: <code>petugas@roadwatch.id</code> / <code>petugas123</code>
        </div>

        <!-- Form Login -->
        <div id="msg-login"></div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-mail"></i></span>
            <input type="email" id="email" class="form-control" placeholder="email@kamu.com" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePass()">
              <i class="ti ti-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-primary w-100 fw-semibold py-2 mt-2" onclick="handleLogin()">
          <i class="ti ti-login me-2"></i>Login
        </button>

        <hr class="my-3" />

        <p class="text-center text-muted small mb-0">
          Belum punya akun?
          <a href="register.html" class="text-primary fw-semibold">Daftar sekarang</a>
        </p>

        <p class="text-center mt-2 small">
          <a href="../index.html" class="text-muted">
            <i class="ti ti-arrow-left me-1"></i>Kembali ke beranda
          </a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Kalau sudah login, redirect
    if (isLoggedIn()) window.location.href = '../index.html';

    function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg-login');

      if (!email || !password) {
        msg.innerHTML = `<div class="alert alert-warning small py-2">Isi semua field terlebih dahulu.</div>`;
        return;
      }

      const result = login(email, password);
      if (result.ok) {
        showToast('Login berhasil! Selamat datang, ' + result.user.nama);
        setTimeout(() => {
          if (result.user.role === 'petugas') window.location.href = 'dashboard.html';
          else window.location.href = '../index.html';
        }, 800);
      } else {
        msg.innerHTML = `<div class="alert alert-danger small py-2">${result.msg}</div>`;
      }
    }

    function togglePass() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') { inp.type = 'text';     icon.className = 'ti ti-eye-off'; }
      else                         { inp.type = 'password'; icon.className = 'ti ti-eye'; }
    }

    // Enter untuk submit
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
