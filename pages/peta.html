<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Laporan — RoadWatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    #map-full { height: calc(100vh - 160px); min-height: 400px; border-radius: 0; }
    .filter-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
    .legend-box { position: absolute; bottom: 30px; left: 10px; z-index: 999; background: white; border-radius: 10px; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 12px; }
    .dot-legend { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="../index.html"><i class="ti ti-road me-2"></i>RoadWatch</a>
      <div class="d-flex gap-2">
        <a href="lapor.html" class="btn btn-warning btn-sm fw-semibold"><i class="ti ti-plus me-1"></i>Lapor</a>
        <a href="../index.html" class="btn btn-outline-light btn-sm"><i class="ti ti-home"></i></a>
      </div>
    </div>
  </nav>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="container-fluid">
      <div class="row g-2 align-items-center">
        <div class="col-auto">
          <input type="text" id="search" class="form-control form-control-sm" placeholder="🔍  Cari lokasi atau kategori..." style="min-width:220px" oninput="renderMarkers()" />
        </div>
        <div class="col-auto">
          <select id="filter-kategori" class="form-select form-select-sm" onchange="renderMarkers()">
            <option value="">Semua Kategori</option>
            <option>Jalan Berlubang</option>
            <option>Trotoar Rusak</option>
            <option>Got / Drainase Tersumbat</option>
            <option>Lampu Jalan Mati</option>
            <option>Rambu Lalu Lintas Rusak</option>
            <option>Jembatan Rusak</option>
            <option>Lainnya</option>
          </select>
        </div>
        <div class="col-auto">
          <select id="filter-status" class="form-select form-select-sm" onchange="renderMarkers()">
            <option value="">Semua Status</option>
            <option>Menunggu</option>
            <option>Diproses</option>
            <option>Selesai</option>
            <option>Ditolak</option>
          </select>
        </div>
        <div class="col-auto">
          <select id="filter-urgensi" class="form-select form-select-sm" onchange="renderMarkers()">
            <option value="">Semua Urgensi</option>
            <option>Tinggi</option>
            <option>Sedang</option>
            <option>Rendah</option>
          </select>
        </div>
        <div class="col-auto ms-auto">
          <span class="badge bg-primary" id="count-badge">0 laporan</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PETA -->
  <div style="position:relative">
    <div id="map-full"></div>
    <div class="legend-box">
      <div class="fw-semibold mb-2 small">Keterangan</div>
      <div><span class="dot-legend" style="background:#f59e0b"></span> Menunggu</div>
      <div><span class="dot-legend" style="background:#3b82f6"></span> Diproses</div>
      <div><span class="dot-legend" style="background:#22c55e"></span> Selesai</div>
      <div><span class="dot-legend" style="background:#ef4444"></span> Ditolak</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/data.js"></script>
  <script>
    updateNavbar();

    const map = L.map('map-full').setView([-7.2575, 112.7521], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let markers = [];

    const warnaPinStatus = {
      'Menunggu': '#f59e0b',
      'Diproses':  '#3b82f6',
      'Selesai':   '#22c55e',
      'Ditolak':   '#ef4444'
    };

    function buatIcon(status) {
      const warna = warnaPinStatus[status] || '#6b7280';
      return L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${warna};border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
    }

    function renderMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const keyword  = document.getElementById('search').value;
      const kategori = document.getElementById('filter-kategori').value;
      const status   = document.getElementById('filter-status').value;
      const urgensi  = document.getElementById('filter-urgensi').value;

      const hasil = filterLaporan({ keyword, kategori, status, urgensi });
      document.getElementById('count-badge').textContent = hasil.length + ' laporan';

      hasil.forEach(l => {
        if (!l.lat || !l.lng) return;
        const m = L.marker([l.lat, l.lng], { icon: buatIcon(l.status) })
          .addTo(map)
          .bindPopup(`
            <div style="min-width:200px">
              ${l.foto ? `<img src="${l.foto}" style="width:100%;height:100px;object-fit:cover;border-radius:6px;margin-bottom:8px">` : ''}
              <div class="d-flex justify-content-between align-items-start mb-1">
                <strong>${l.kategori}</strong>
                <span style="font-size:11px;padding:2px 7px;border-radius:99px;background:${warnaPinStatus[l.status]}22;color:${warnaPinStatus[l.status]}">${l.status}</span>
              </div>
              <p style="font-size:12px;color:#64748b;margin:4px 0">${l.deskripsi?.substring(0,100) || '-'}</p>
              <p style="font-size:11px;color:#94a3b8;margin:0"><i class="ti ti-map-pin"></i> ${l.alamat || 'Lokasi tidak tercatat'}</p>
              <p style="font-size:11px;color:#94a3b8;margin:2px 0"><i class="ti ti-clock"></i> ${formatTanggal(l.tanggal)}</p>
              ${l.catatan ? `<p style="font-size:11px;color:#0369a1;margin:4px 0">Catatan: ${l.catatan}</p>` : ''}
            </div>
          `);
        markers.push(m);
      });
    }

    renderMarkers();
  </script>
</body>
</html>
