<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — RoadWatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-light">

  <div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0 w-100" style="max-width:440px">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:60px;height:60px">
            <i class="ti ti-user-plus text-white" style="font-size:1.75rem"></i>
          </div>
          <h4 class="fw-bold mb-0">Buat Akun Baru</h4>
          <p class="text-muted small">Bergabung dan mulai laporkan kerusakan jalan</p>
        </div>

        <div id="msg-register"></div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Nama Lengkap</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-user"></i></span>
            <input type="text" id="nama" class="form-control" placeholder="Nama kamu" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-mail"></i></span>
            <input type="email" id="email" class="form-control" placeholder="email@kamu.com" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Min. 6 karakter" />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small">Konfirmasi Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="ti ti-lock-check"></i></span>
            <input type="password" id="konfirmasi" class="form-control" placeholder="Ulangi password" />
          </div>
        </div>

        <button class="btn btn-primary w-100 fw-semibold py-2" onclick="handleRegister()">
          <i class="ti ti-user-check me-2"></i>Daftar Sekarang
        </button>

        <hr class="my-3" />
        <p class="text-center text-muted small mb-0">
          Sudah punya akun?
          <a href="login.html" class="text-primary fw-semibold">Login di sini</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '../index.html';

    function handleRegister() {
      const nama      = document.getElementById('nama').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const konfirmasi= document.getElementById('konfirmasi').value;
      const msg       = document.getElementById('msg-register');

      if (!nama || !email || !password || !konfirmasi) {
        msg.innerHTML = `<div class="alert alert-warning small py-2">Semua field wajib diisi.</div>`;
        return;
      }
      if (password.length < 6) {
        msg.innerHTML = `<div class="alert alert-warning small py-2">Password minimal 6 karakter.</div>`;
        return;
      }
      if (password !== konfirmasi) {
        msg.innerHTML = `<div class="alert alert-danger small py-2">Password tidak cocok.</div>`;
        return;
      }

      const result = register(nama, email, password, 'warga');
      if (result.ok) {
        msg.innerHTML = `<div class="alert alert-success small py-2">${result.msg}</div>`;
        setTimeout(() => window.location.href = 'login.html', 1200);
      } else {
        msg.innerHTML = `<div class="alert alert-danger small py-2">${result.msg}</div>`;
      }
    }
  </script>
</body>
</html>
